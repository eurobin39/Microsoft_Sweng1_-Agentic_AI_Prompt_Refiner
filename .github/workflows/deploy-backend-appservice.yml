name: Deploy Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-appservice.yml"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  AZURE_WEBAPP_NAME: "${{ secrets.AZURE_WEBAPP_NAME }}"
  AZURE_WEBAPP_PACKAGE_PATH: "backend"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run syntax check
        working-directory: backend
        run: |
          python -m compileall -q .

      - name: Run import smoke check
        working-directory: backend
        run: |
          python - <<'PY'
          import importlib

          modules = [
              "app.main",
              "app.core.definitions",
              "app.core.workflow",
              "app.core.runner",
              "app.api.routes.health",
              "app.api.routes.evaluation",
              "app.api.routes.extract_blueprint",
          ]

          for module_name in modules:
              importlib.import_module(module_name)
              print(f"Imported: {module_name}")
          PY

      - name: Validate ASGI app load
        working-directory: backend
        run: |
          python - <<'PY'
          from fastapi import FastAPI
          from app.main import app

          assert isinstance(app, FastAPI), "app.main:app is not a FastAPI instance"
          assert app.routes, "No routes registered in app.main:app"
          print(f"ASGI app loaded with {len(app.routes)} routes")
          PY

      - name: Create deployment package
        run: |
          cd ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
          zip -r ../release.zip . \
            -x "venv/*" "__pycache__/*" "*.pyc" "*.pyo" ".pytest_cache/*" "tests/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
