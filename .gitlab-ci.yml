stages:
  - smoke

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "push"
    - when: never

default:
  image: python:3.13
  tags: ["docker"]
  timeout: 10m

backend-route-smoke:
  stage: smoke
  script:
    - echo "Checking FastAPI router wiring for Prompt Refiner..."
    - rg -n 'include_router\(health\.router, prefix="/api"' backend/app/main.py
    - rg -n 'include_router\(evaluation\.router, prefix="/api/v1"' backend/app/main.py
    - rg -n '@router\.get\("/health"\)' backend/app/api/routes/health.py
    - rg -n '@router\.post\("/evaluate"\)' backend/app/api/routes/evaluation.py
    - python3 -m py_compile backend/app/main.py backend/app/api/routes/health.py backend/app/api/routes/evaluation.py

schema-smoke:
  stage: smoke
  script:
    - echo "Checking schema file syntax..."
    - python3 -m json.tool schema/evaluation_input.schema.json > /dev/null
    - python3 -m json.tool schema/example_code_explainer.json > /dev/null
