# Code Assistant Workflow Integration Tests
integration-code-assistant:
  stage: integration
  image: python:3.13
  tags: ["docker"]
  timeout: 15m
  needs: ["test-code-assistant"]
  before_script:
    - cd backend
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pytest pytest-timeout
  script:
    - echo "Running Code Assistant Workflow Tests..."
    - |
      pytest tests/test_agent_integration.py::TestMultiAgentIntegration::test_multi_step_workflow \
        tests/test_agent_integration.py::TestMultiAgentIntegration::test_natural_language_understanding \
        tests/test_agent_integration.py::TestMultiAgentIntegration::test_complex_code_handling \
        -v \
        --junit-xml=test-results/code-workflow-junit.xml \
