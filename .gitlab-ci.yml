stages:
  - validate
  - test

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

default:
  tags: ["docker"]
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  GIT_DEPTH: "0"
  GIT_STRATEGY: clone
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_ROOT_USER_ACTION: ignore

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
    - .cache/npm
  policy: pull-push

.python-job:
  image: python:3.11
  before_script:
    - python --version
    - python -m pip install --upgrade pip

.node-job:
  image: node:22
  before_script:
    - node --version
    - npm --version

backend-syntax:
  stage: validate
  extends: .python-job
  script:
    - echo "Compile-check backend Python files..."
    - python -m compileall -q backend

backend-runtime-smoke:
  stage: validate
  extends: .python-job
  script:
    - echo "Install backend runtime dependencies..."
    - pip install -r backend/requirements.txt
    - pip check
    - cd backend
    - echo "Import smoke check for critical backend modules..."
    - |
      python - <<'PY'
      import importlib

      modules = [
          "app.main",
          "app.core.definitions",
          "app.core.workflow",
          "app.core.runner",
          "app.api.routes.health",
          "app.api.routes.evaluation",
          "app.api.routes.extract_blueprint",
          "app.models.models",
          "app.models.trace_logs",
      ]

      for module_name in modules:
          importlib.import_module(module_name)
          print(f"Imported: {module_name}")
      PY
    - echo "Validate FastAPI app object and route registration..."
    - |
      python - <<'PY'
      from fastapi import FastAPI
      from app.main import app

      assert isinstance(app, FastAPI), "app.main:app is not a FastAPI instance"
      assert app.routes, "No routes registered in app.main:app"
      print(f"ASGI app loaded with {len(app.routes)} routes")
      PY
  needs: ["backend-syntax"]

backend-unit-tests:
  stage: test
  extends: .python-job
  script:
    - pip install -r backend/requirements-ci.txt "pydantic>=2,<3"
    - cd backend
    - PYTHONPATH=. pytest -q tests/test_models.py --maxfail=1 --junitxml="$CI_PROJECT_DIR/backend-unit-junit.xml"
  artifacts:
    when: always
    reports:
      junit: backend-unit-junit.xml

frontend-build:
  stage: test
  extends: .node-job
  script:
    - cd frontend
    - npm ci --prefer-offline --no-audit
    - npm run build

backend-integration-tests:
  stage: test
  extends: .python-job
  script:
    - pip install -r backend/requirements.txt -r backend/requirements-ci.txt
    - cd backend
    - PYTHONPATH=. pytest -q tests/test_agent_integration.py tests/test_travel_integration.py tests/test_resume_integration.py --maxfail=1 --junitxml="$CI_PROJECT_DIR/backend-integration-junit.xml"
  artifacts:
    when: always
    reports:
      junit: backend-integration-junit.xml
  rules:
    - if: '$RUN_BACKEND_INTEGRATION == "true"'
    - when: never
