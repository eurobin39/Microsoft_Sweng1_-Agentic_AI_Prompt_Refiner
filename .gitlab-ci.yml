stages:
  - health-check
  - test
  - integration
  - performance
  - report

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_VERSION: "3.10"
  AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
  AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
  AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT}
  GIT_DEPTH: "0"
  GIT_STRATEGY: clone # Ensure we have the full history for better debugging and coverage reports

cache:
  paths:
    - .cache/pip
    - backend/venv/

# Health Check & API Connection Test -   ensures server starts and environment variables are set correctly before running integration tests
health-check:
  stage: health-check
  image: python:3.13
  tags: ["docker"]
  timeout: 10m
  before_script:
    - cd backend
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pytest httpx
  script:
    - echo "==== Environment Variable Check ==== "
    - |
      if [ -z "$AZURE_OPENAI_API_KEY" ]; then echo "MISSING: AZURE_OPENAI_API_KEY"; fi
      if [ -z "$AZURE_OPENAI_ENDPOINT" ]; then echo "MISSING: AZURE_OPENAI_ENDPOINT"; fi
      if [ -z "$AZURE_OPENAI_DEPLOYMENT" ] || [ "$AZURE_OPENAI_DEPLOYMENT" = '${AZURE_OPENAI_DEPLOYMENT}' ]; then echo "MISSING: AZURE_OPENAI_DEPLOYMENT"; fi
      echo "Env check done"
    - echo "=== Inspect main.py bottom ==="
    - tail -20 app/main.py || true
    - echo "=== Test import ==="
    - python -c "from app.main import app; print(type(app)); print('Import OK')"
    - echo "=== Starting server with uvicorn CLI ==="
    - python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level info > /tmp/api.log 2>&1 &
    - API_PID=$!
    - 'echo "API PID: $API_PID"'
    - echo "Waiting 15 seconds for startup..."
    - sleep 15
    - echo "=== Server log ==="
    - cat /tmp/api.log || true
    - echo "=== End log ==="
    - |
      if ! kill -0 $API_PID 2>/dev/null; then
        echo "ERROR: Server process not running"
        echo "=== Trying PYTHONUNBUFFERED ==="
        PYTHONUNBUFFERED=1 python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --log-level debug > /tmp/api2.log 2>&1 &
        API_PID2=$!
        sleep 15
        cat /tmp/api2.log || true
        if ! kill -0 $API_PID2 2>/dev/null; then
          echo "ERROR: Server failed again. Trying inline uvicorn.run..."
          PYTHONUNBUFFERED=1 timeout 10 python -c "
      import uvicorn
      from app.main import app
      print('About to start uvicorn.run...')
      uvicorn.run(app, host='0.0.0.0', port=8000, log_level='debug')
      " 2>&1 || true
          echo "All startup methods failed"
          exit 1
        fi
        API_PID=$API_PID2
      fi
    - echo "Server is running! Testing health..."
    - |
      python -c "
      import httpx, time, sys
      urls = ['http://localhost:8000/api/health', 'http://localhost:8000/health', 'http://localhost:8000/']
      for url in urls:
          print(f'Trying {url}...')
          try:
              r = httpx.get(url, timeout=5.0)
              print(f'  -> {r.status_code}')
              if r.status_code == 200:
                  print(f'Health check passed on {url}')
                  sys.exit(0)
          except Exception as e:
              print(f'  -> {e}')
      print('Retrying primary endpoint...')
      for i in range(10):
          try:
              r = httpx.get('http://localhost:8000/api/health', timeout=5.0)
              if r.status_code == 200:
                  print('Health check passed!')
                  sys.exit(0)
              print(f'Attempt {i+1}: status {r.status_code}')
          except Exception as e:
              print(f'Attempt {i+1}: {e}')
          time.sleep(3)
      print('Health check failed')
      sys.exit(1)
      "
  artifacts:
    when: always
    paths:
      - backend/test-results/
    expire_in: 1 week
  allow_failure: false

# Code Assistant Integration Tests
test-code-assistant:
  stage: test
  image: python:3.13
  tags: ["docker"]
  timeout: 20m
  needs: ["health-check"]
  before_script:
    - cd backend
    - pip install --upgrade pip
    - pip install -r requirements.txt
    - pip install pytest pytest-cov pytest-timeout pytest-xdist
  script:
    - echo "Running Code Assistant Integration Tests..."
    - |
      pytest tests/test_agent_integration.py \
        -v \
        --cov=app.demos.code_assistant \
        --cov-report=xml \
        --cov-report=html \
        --junit-xml=test-results/junit-code-assistant.xml \
        --timeout=60 \
        -n auto
  artifacts:
    when: always
    paths:
      - backend/test-results/
      - backend/htmlcov/
    reports:
      junit: backend/test-results/junit-code-assistant.xml
    expire_in: 1 week
  allow_failure: false

