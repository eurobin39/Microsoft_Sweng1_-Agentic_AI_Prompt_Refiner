stages:
  - validate
  - test
  - integration

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

default:
  tags: ["docker", "euro-macmini-runner"]
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  GIT_DEPTH: "0"
  GIT_STRATEGY: clone

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
    - .cache/npm

.python-job:
  image: python:3.13
  before_script:
    - python --version
    - python -m pip install --upgrade pip

.node-job:
  image: node:22
  before_script:
    - node --version
    - npm --version

repo-sanity:
  stage: validate
  extends: .python-job
  script:
    - echo "Static sanity checks for backend routing and schemas..."
    - python -m compileall -q backend/app
    - grep -nE 'include_router\(health\.router, prefix="/api"' backend/app/main.py
    - grep -nE 'include_router\(evaluation\.router, prefix="/api/v1"' backend/app/main.py
    - grep -nE '@router\.get\("/health"\)' backend/app/api/routes/health.py
    - grep -nE '@router\.post\("/evaluate"' backend/app/api/routes/evaluation.py
    - python -m json.tool schema/evaluation_input.schema.json > /dev/null
    - python -m json.tool schema/weather_agent.json > /dev/null

backend-unit-pytest:
  stage: test
  extends: .python-job
  script:
    - pip install -r backend/requirements-ci.txt "pydantic>=2,<3"
    - cd backend
    - PYTHONPATH=. pytest -q tests/test_models.py tests/test_judge_tools.py tests/test_refiner_tools.py --junitxml="$CI_PROJECT_DIR/backend-unit-junit.xml"
  artifacts:
    when: always
    reports:
      junit: backend-unit-junit.xml

frontend-smoke:
  stage: test
  extends: .node-job
  script:
    - cd frontend
    - npm ci --prefer-offline --no-audit
    - npm run lint
    - |
      if [ -d app ] || [ -d pages ] || [ -d src/app ] || [ -d src/pages ]; then
        npm run build
      else
        echo "No Next.js app/pages directory found on this branch; skipping build."
      fi

azure-openai-connectivity:
  stage: integration
  extends: .python-job
  script:
    - |
      python - <<'PY'
      import json
      import os
      import sys
      import urllib.error
      import urllib.request

      deployment = os.getenv("AZURE_OPENAI_DEPLOYMENT_NAME") or os.getenv("AZURE_OPENAI_DEPLOYMENT")
      required = {
          "AZURE_OPENAI_ENDPOINT": os.getenv("AZURE_OPENAI_ENDPOINT"),
          "AZURE_OPENAI_API_KEY": os.getenv("AZURE_OPENAI_API_KEY"),
          "AZURE_OPENAI_DEPLOYMENT_NAME|AZURE_OPENAI_DEPLOYMENT": deployment,
      }
      missing = [name for name, value in required.items() if not value]
      if missing:
          print(f"Missing required variables: {', '.join(missing)}")
          sys.exit(1)

      endpoint = os.environ["AZURE_OPENAI_ENDPOINT"].rstrip("/")
      api_version = os.getenv("AZURE_OPENAI_API_VERSION", "2024-10-21")
      url = (
          f"{endpoint}/openai/deployments/{deployment}/chat/completions"
          f"?api-version={api_version}"
      )
      payload = {
          "messages": [{"role": "user", "content": "Reply with exactly: pong"}],
          "temperature": 0,
          "max_tokens": 16,
      }
      request = urllib.request.Request(
          url=url,
          data=json.dumps(payload).encode("utf-8"),
          method="POST",
          headers={
              "Content-Type": "application/json",
              "api-key": os.environ["AZURE_OPENAI_API_KEY"],
          },
      )

      try:
          with urllib.request.urlopen(request, timeout=30) as response:
              body = response.read().decode("utf-8")
      except urllib.error.HTTPError as exc:
          detail = exc.read().decode("utf-8", errors="ignore")
          print(f"Azure OpenAI HTTP {exc.code}: {detail}")
          sys.exit(1)
      except Exception as exc:  # noqa: BLE001
          print(f"Azure OpenAI connectivity check failed: {exc}")
          sys.exit(1)

      parsed = json.loads(body)
      message = (
          ((parsed.get("choices") or [{}])[0].get("message") or {})
          .get("content", "")
          .strip()
      )
      if not message:
          print("Azure OpenAI returned an empty response payload.")
          sys.exit(1)

      print(f"Azure OpenAI connectivity OK. Response: {message[:120]}")
      PY

agent-framework-smoke:
  stage: integration
  extends: .python-job
  script:
    - pip install -r backend/requirements-ci.txt agent-framework agent-framework-azure-ai azure-identity python-dotenv requests
    - export PYTHONPATH="$CI_PROJECT_DIR/backend:$CI_PROJECT_DIR/backend/app/demos"
    - |
      python - <<'PY'
      import os
      import sys

      deployment = os.getenv("AZURE_OPENAI_DEPLOYMENT_NAME") or os.getenv("AZURE_OPENAI_DEPLOYMENT")
      required = {
          "AZURE_OPENAI_ENDPOINT": os.getenv("AZURE_OPENAI_ENDPOINT"),
          "AZURE_OPENAI_API_KEY": os.getenv("AZURE_OPENAI_API_KEY"),
          "AZURE_OPENAI_DEPLOYMENT_NAME|AZURE_OPENAI_DEPLOYMENT": deployment,
      }
      missing = [name for name, value in required.items() if not value]
      if missing:
          print(f"Missing required variables: {', '.join(missing)}")
          sys.exit(1)

      # Support both naming conventions used across this repo.
      os.environ["AZURE_OPENAI_DEPLOYMENT_NAME"] = deployment
      os.environ["AZURE_OPENAI_DEPLOYMENT"] = deployment

      from app.demos.code_assistant.agents import explain_code
      from app.demos.resume_assistant.agents import analyze_job

      code_result = explain_code("def add(a, b):\n    return a + b")
      if not code_result.strip():
          raise RuntimeError("Code assistant agent returned an empty response.")

      resume_result = analyze_job(
          "Senior backend engineer role requiring Python, Docker, and CI/CD experience."
      )
      if not resume_result.strip():
          raise RuntimeError("Resume analyzer agent returned an empty response.")

      print("Agent Framework smoke check OK (code + resume agents).")
      PY

fastapi-endpoint-smoke:
  stage: integration
  extends: .python-job
  script:
    - pip install -r backend/requirements-ci.txt fastapi uvicorn python-dotenv agent-framework agent-framework-azure-ai azure-identity
    - export PYTHONPATH="$CI_PROJECT_DIR/backend"
    - |
      python - <<'PY'
      import json
      import os
      from fastapi.testclient import TestClient

      # Ensure both naming conventions are available if either one is set.
      deployment = os.getenv("AZURE_OPENAI_DEPLOYMENT_NAME") or os.getenv("AZURE_OPENAI_DEPLOYMENT")
      if deployment:
          os.environ["AZURE_OPENAI_DEPLOYMENT_NAME"] = deployment
          os.environ["AZURE_OPENAI_DEPLOYMENT"] = deployment

      from app.main import app

      client = TestClient(app)

      health = client.get("/api/health")
      if health.status_code != 200:
          print(f"/api/health failed: HTTP {health.status_code} {health.text[:300]}")
          raise SystemExit(1)
      if health.json().get("status") != "ok":
          print(f"/api/health unexpected payload: {health.text[:300]}")
          raise SystemExit(1)

      openapi_resp = client.get("/openapi.json")
      if openapi_resp.status_code != 200:
          print(f"/openapi.json failed: HTTP {openapi_resp.status_code}")
          raise SystemExit(1)

      paths = openapi_resp.json().get("paths", {})
      if "/api/health" not in paths:
          print("OpenAPI missing /api/health path.")
          raise SystemExit(1)
      if "/api/v1/evaluate" not in paths:
          print("OpenAPI missing /api/v1/evaluate path.")
          raise SystemExit(1)

      eval_payload = {
          "blueprint": {
              "agent": {"system_prompt": "You are a helpful assistant."},
              "test_cases": [{"input": "hello"}],
          },
          "traces": [],
      }
      eval_resp = client.post("/api/v1/evaluate", json=eval_payload)
      if eval_resp.status_code not in (200, 500):
          print(f"Unexpected /api/v1/evaluate status: {eval_resp.status_code}")
          print(eval_resp.text[:400])
          raise SystemExit(1)

      if eval_resp.status_code == 200:
          parsed = eval_resp.json()
          if "evaluation" not in parsed:
              print("Evaluate response missing 'evaluation' key.")
              raise SystemExit(1)
          print("FastAPI endpoint smoke OK (/health + /evaluate=200).")
      else:
          print("FastAPI endpoint reachable (/evaluate returned 500 due to runtime dependencies).")
      PY

mcp-apim-healthcheck:
  stage: integration
  extends: .python-job
  script:
    - |
      python - <<'PY'
      import os
      import sys
      import urllib.error
      import urllib.request

      url = (
          os.getenv("MCP_APIM_HEALTHCHECK_URL", "").strip()
          or os.getenv("APIM_MCP_HEALTHCHECK_URL", "").strip()
          or os.getenv("MCP_SERVER_HEALTHCHECK_URL", "").strip()
          or os.getenv("MCP_SERVER_URL", "").strip()
      )
      if not url:
          print(
              "Missing required variable: one of "
              "MCP_APIM_HEALTHCHECK_URL / APIM_MCP_HEALTHCHECK_URL / "
              "MCP_SERVER_HEALTHCHECK_URL / MCP_SERVER_URL"
          )
          sys.exit(1)

      headers = {}
      subscription_key = os.getenv("MCP_APIM_SUBSCRIPTION_KEY", "").strip()
      bearer_token = os.getenv("MCP_APIM_BEARER_TOKEN", "").strip()
      extra_header = os.getenv("MCP_APIM_EXTRA_HEADER", "").strip()

      if subscription_key:
          headers["Ocp-Apim-Subscription-Key"] = subscription_key
      if bearer_token:
          headers["Authorization"] = f"Bearer {bearer_token}"
      if extra_header:
          if ":" not in extra_header:
              print("MCP_APIM_EXTRA_HEADER must be in 'Key: Value' format.")
              sys.exit(1)
          key, value = extra_header.split(":", 1)
          headers[key.strip()] = value.strip()

      method = os.getenv("MCP_APIM_METHOD", "GET").upper()
      body = os.getenv("MCP_APIM_REQUEST_BODY", "")
      data = body.encode("utf-8") if body else None

      request = urllib.request.Request(url=url, data=data, method=method, headers=headers)
      try:
          with urllib.request.urlopen(request, timeout=20) as response:
              status = response.getcode()
              payload = response.read().decode("utf-8", errors="ignore")
      except urllib.error.HTTPError as exc:
          detail = exc.read().decode("utf-8", errors="ignore")
          print(f"MCP APIM HTTP {exc.code}: {detail}")
          sys.exit(1)
      except Exception as exc:  # noqa: BLE001
          print(f"MCP APIM connectivity check failed: {exc}")
          sys.exit(1)

      if status < 200 or status >= 300:
          print(f"MCP APIM returned non-2xx status: {status}")
          sys.exit(1)

      expected = os.getenv("MCP_APIM_EXPECT_CONTAINS", "").strip()
      if expected and expected not in payload:
          print("MCP APIM response did not contain expected marker text.")
          sys.exit(1)

      print(f"MCP APIM healthcheck OK ({status}).")
      print(payload[:300])
      PY
