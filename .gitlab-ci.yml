stages:
  - validate
  - test

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never

default:
  tags: ["docker"]
  interruptible: true
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.cache/npm"
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  GIT_DEPTH: "0"
  GIT_STRATEGY: clone

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip
    - .cache/npm

.python-job:
  image: python:3.13
  before_script:
    - python --version
    - python -m pip install --upgrade pip

.node-job:
  image: node:22
  before_script:
    - node --version
    - npm --version

repo-sanity:
  stage: validate
  extends: .python-job
  script:
    - echo "Static sanity checks for backend routing and schemas..."
    - python -m compileall -q backend/app
    - grep -nE 'include_router\(health\.router, prefix="/api"' backend/app/main.py
    - grep -nE 'include_router\(evaluation\.router, prefix="/api/v1"' backend/app/main.py
    - grep -nE '@router\.get\("/health"\)' backend/app/api/routes/health.py
    - grep -nE '@router\.post\("/evaluate"' backend/app/api/routes/evaluation.py

backend-unit-pytest:
  stage: test
  extends: .python-job
  script:
    - pip install -r backend/requirements-ci.txt "pydantic>=2,<3"
    - cd backend
    - PYTHONPATH=. pytest -q tests/test_models.py --junitxml="$CI_PROJECT_DIR/backend-unit-junit.xml"
  artifacts:
    when: always
    reports:
      junit: backend-unit-junit.xml

frontend-smoke:
  stage: test
  extends: .node-job
  script:
    - cd frontend
    - npm ci --prefer-offline --no-audit
    - |
      if [ -d app ] || [ -d pages ] || [ -d src/app ] || [ -d src/pages ]; then
        npm run build
      else
        echo "No Next.js app/pages directory found on this branch; skipping build."
      fi
